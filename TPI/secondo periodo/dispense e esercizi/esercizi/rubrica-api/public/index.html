<!DOCTYPE html>
<html>
  <head>
    <title>Rubrica</title>
    
    <link rel="stylesheet" href="spaceBG.css">
    <script src="spaceBG.js" defer></script>
    
    <link rel="stylesheet" href="index.css">
    <script src="index.js" defer></script>
  </head>
  <body>
    <div id="scene">
      <canvas id="c">
    </canvas></div>

    <div id="contenitore-principale">
      <form id="form-contatto">
        <div>
          <label for="input-nome">Nome:</label>
          <input id="input-nome" type="text">
        </div>

        <div>
          <label for="input-cognome">Cognome:</label>
          <input id="input-cognome" type="text">
        </div>

        <div>
          <label for="input-telefono">Telefono:</label>
          <input id="input-telefono" type="tel" pattern="[0-9\-\s]+">
        </div>

        <div>
          <label for="input-email">Email:</label>
          <input id="input-email" type="email">
        </div>

      <input id="btn-submit" type="submit" value="Aggiungi contatto"></input>
    </form>
      <div id="container-tabella"></div>
      <div id="contenitore-info">
        <div id="messaggio"></div>
        <div id="api-log-entries"></div>
      </div>
    </div>
  </body>
</html>
